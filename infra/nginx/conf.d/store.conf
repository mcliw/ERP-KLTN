# Upstream cho NextJS
upstream ecommerce_store_upstream {
    server ecommerce-store:3000;
}

# Redirect HTTP sang HTTPS
server {
    listen 80;
    server_name store.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name store.local;

    ssl_certificate /etc/nginx/certs/certificate.crt;
    ssl_certificate_key /etc/nginx/certs/private.key;

    # 1. Cấu hình cho Frontend (NextJS Store)
    location / {
        proxy_pass http://ecommerce_store_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Cấu hình cho Backend API (Gateway)
    # Store gọi API qua chính domain của nó để tránh lỗi CORS (Same Origin)
    # Ví dụ: Frontend gọi /api/products -> Nginx proxy sang Gateway
    location /api/ {
        proxy_pass http://gateway_upstream; # Tái sử dụng upstream từ portal hoặc khai báo lại
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443;
    }
}