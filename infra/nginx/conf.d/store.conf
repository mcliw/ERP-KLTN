# 1. Định nghĩa Upstream riêng cho Store Frontend
upstream ecommerce_store_upstream {
    server ecommerce-store:3000;
}

# 2. Định nghĩa Upstream cho Gateway (Nên dùng tên khác để tránh trùng lặp với portal.conf nếu Nginx gộp config, hoặc trỏ thẳng container)
# Cách an toàn nhất là trỏ trực tiếp vào container:port trong directive proxy_pass ở dưới,
# hoặc định nghĩa một upstream riêng biệt cho file này.
upstream gateway_service_upstream {
    server gateway-service:8080;
}

# Redirect HTTP sang HTTPS
server {
    listen 80;
    server_name store.local;
    return 301 https://$host$request_uri;
}

# Cấu hình HTTPS chính
server {
    listen 443 ssl;
    server_name store.local;

    # Dùng chung chứng chỉ (Lưu ý: Chứng chỉ cần hỗ trợ tên miền store.local để không bị cảnh báo đỏ)
    ssl_certificate /etc/nginx/certs/certificate.crt;
    ssl_certificate_key /etc/nginx/certs/private.key;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 1. Cấu hình cho Frontend (NextJS Store) -> Hiển thị Form/UI
    location / {
        proxy_pass http://ecommerce_store_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # NextJS đôi khi cần upgrade header cho HMR (Hot Module Replacement) trong môi trường dev
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 2. Cấu hình cho Backend API (Gọi sang Gateway Service)
    location /api/ {
        # SỬA ĐỔI: Sử dụng upstream đã định nghĩa riêng hoặc trỏ thẳng container
        proxy_pass http://gateway_service_upstream;
        proxy_redirect http:// https://;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443;
        
        # Quan trọng cho Spring Gateway nhận diện host gốc
        proxy_set_header X-Forwarded-Host $host;
    }
}