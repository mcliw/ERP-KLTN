# Định nghĩa các nhóm server (Upstream) để dễ quản lý
upstream erp_portal_upstream {
    server erp-portal:80;
}

upstream gateway_upstream {
    server gateway-service:8080;
}

# Redirect HTTP sang HTTPS
server {
    listen 80;
    server_name ldgcompany.local;
    return 301 https://$host$request_uri;
}

# Cấu hình HTTPS chính
server {
    listen 443 ssl;
    server_name ldgcompany.local;

    # Đường dẫn chứng chỉ (được mount vào container)
    ssl_certificate /etc/nginx/certs/certificate.crt;
    ssl_certificate_key /etc/nginx/certs/private.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 1. Cấu hình cho Frontend (ERP Portal)
    location / {
        proxy_pass http://erp_portal_upstream;
        
        # Các header cần thiết
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Hỗ trợ WebSockets (cho Vite HMR khi dev hoặc các tính năng realtime)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 2. Cấu hình cho Backend API (Gateway)
    location /api/ {
        proxy_pass http://gateway_upstream;
        proxy_redirect http:// https://;
        # Header để code Java nhận diện đúng domain gốc
        # Dòng này khớp hoàn toàn với logic request.getHeader("X-Forwarded-Host") trong AuthGraphQLCOntroler
        proxy_set_header X-Forwarded-Host $host;
        # Header quan trọng để Spring Gateway nhận diện đúng domain gốc
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443;
    }
}