server:
  port: 8080
  forward-headers-strategy: framework # Giữ header gốc từ Nginx (Host, X-Real-IP)

jwt:
  secret: ${JWT_SECRET} 

spring:
  application:
    name: gateway-service
  main:
    web-application-type: reactive
  # CẤU HÌNH BẢO MẬT (MỚI)
  # Gateway đóng vai trò Resource Server, cần biết thuật toán để validate Token
  security:
    oauth2:
      resourceserver:
        jwt:
          jws-algorithm: HS512 # Phải khớp với thuật toán ký bên Identity Service

  cloud:
    gateway:
      # 1. Cấu hình CORS Global (Cho phép Frontend gọi vào)
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: 
              - "https://ldgcompany.local"
              - "https://store.local"
              - "http://localhost:3000" # Frontend Dev
              - "http://localhost:5173" # Vite Dev
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true # Cho phép gửi cookie/auth header

      # 2. Định tuyến (Routes) - URI phải khớp với container_name trong docker-compose
      routes:
        # Route 1: Identity Service (Nơi duy nhất cho phép public access login/register)
        - id: identity-service
          uri: http://identity-service:8080
          predicates:
            - Path=/api/identity/**
          filters:
            - StripPrefix=1 # /api/identity/graphql -> /identity/graphql

        # Route 2: Sales CRM Service
        - id: sales-service
          uri: http://sales-service:8080
          predicates:
            - Path=/api/sales/**
          filters:
            - StripPrefix=1

        # Route 3: HRM Service
        - id: hrm-service
          uri: http://hrm-service:8080
          predicates:
            - Path=/api/hrm/**
          filters:
            - StripPrefix=1

        # Route 4: Supply Chain Service
        - id: supply-chain-service
          uri: http://supply-chain-service:8080
          predicates:
            - Path=/api/supply-chain/**
          filters:
            - StripPrefix=1

        # Route 5: Accounting Service
        - id: accounting-service
          uri: http://accounting-service:8080
          predicates:
            - Path=/api/accounting/**
          filters:
            - StripPrefix=1 

        # Route 6: AI Assistant
        - id: ai-service
          uri: http://ai-service:8000
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=1